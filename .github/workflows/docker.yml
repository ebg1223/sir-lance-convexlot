name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image digest artifact
        if: github.event_name != 'pull_request'
        run: |
          cat > container-image.json <<JSON
          {
            "image": "${{ env.IMAGE_NAME }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "ref": "${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}",
            "source_sha": "${{ github.sha }}",
            "tags": ${{ toJSON(steps.meta.outputs.tags) }}
          }
          JSON
          cat container-image.json
          echo "### Container image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: container-image
          path: container-image.json

  infra-pr:
    name: Open infra digest PR
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Check infra PR configuration
        id: infra
        env:
          TOKEN: ${{ secrets.INFRA_REPOSITORY_TOKEN }}
          REPOSITORY: ${{ secrets.INFRA_REPOSITORY }}
          IMAGE_FILE: ${{ secrets.INFRA_IMAGE_FILE }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$REPOSITORY" ] && [ -n "$IMAGE_FILE" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping infra PR because one or more infra PR secrets are not configured." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Download image digest artifact
        if: steps.infra.outputs.configured == 'true'
        uses: actions/download-artifact@v5
        with:
          name: container-image
          path: image

      - name: Checkout infra repository
        if: steps.infra.outputs.configured == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.INFRA_REPOSITORY }}
          token: ${{ secrets.INFRA_REPOSITORY_TOKEN }}
          path: infra

      - name: Update pinned image digest
        if: steps.infra.outputs.configured == 'true'
        id: image
        env:
          INFRA_IMAGE_FILE: ${{ secrets.INFRA_IMAGE_FILE }}
        run: |
          REF="$(jq -r .ref image/container-image.json)"
          SOURCE_SHA="$(jq -r .source_sha image/container-image.json)"
          SHORT_SHA="${SOURCE_SHA:0:7}"
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          image = json.loads(Path("image/container-image.json").read_text())
          path = Path("infra") / os.environ["INFRA_IMAGE_FILE"]
          text = path.read_text()
          patterns = [
              r'(variable "container_image" \{[\s\S]*?default\s*=\s*")[^"]+(")',
              r'(variable "lance_incremental_image" \{[\s\S]*?default\s*=\s*")[^"]+(")',
          ]
          for pattern in patterns:
              updated, count = re.subn(pattern, rf'\1{image["ref"]}\2', text, count=1)
              if count == 1:
                  break
          else:
              raise SystemExit("failed to update image variable default")
          path.write_text(updated)
          PY
          {
            echo "ref=$REF"
            echo "source_sha=$SOURCE_SHA"
            echo "short_sha=$SHORT_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update infra PR
        if: steps.infra.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPOSITORY_TOKEN }}
          INFRA_REPOSITORY: ${{ secrets.INFRA_REPOSITORY }}
          INFRA_IMAGE_FILE: ${{ secrets.INFRA_IMAGE_FILE }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          SOURCE_SHA: ${{ steps.image.outputs.source_sha }}
          SHORT_SHA: ${{ steps.image.outputs.short_sha }}
        run: |
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/container-image"
          git checkout -B "$BRANCH"
          git add "$INFRA_IMAGE_FILE"
          if git diff --cached --quiet; then
            echo "Infra already pins $IMAGE_REF." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git commit -m "Bump Container image to ${SHORT_SHA}"
          git push --force-with-lease origin "$BRANCH"
          BODY="Updates \`container_image\` to the immutable Container image digest built from \`${SOURCE_SHA}\`.

          Image:
          \`\`\`
          ${IMAGE_REF}
          \`\`\`

          Source workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if gh pr view "$BRANCH" --repo "$INFRA_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --repo "$INFRA_REPOSITORY" --title "Bump Container image" --body "$BODY"
          else
            gh pr create --repo "$INFRA_REPOSITORY" --base main --head "$BRANCH" --title "Bump Container image" --body "$BODY"
          fi
